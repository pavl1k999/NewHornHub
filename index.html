<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>HORN HUB</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#0a0a0d;
  --bg-1:#101016;
  --bg-2:#16161d;
  --surface:rgba(255,255,255,.045);
  --surface-2:rgba(255,255,255,.08);
  --stroke:rgba(255,255,255,.08);
  --stroke-2:rgba(255,255,255,.16);
  --txt:#f5f5f8;
  --muted:#9a9aa6;
  --muted-2:#65656f;
  --primary:#8b5cf6;
  --primary-bright:#a78bfa;
  --primary-deep:#6d28d9;
  --accent:#22c55e;
  --accent-bright:#4ade80;
  --pink:#ec4899;
  --danger:#ff5c6c;
  --telegram:#229ED9;
  --radius:16px;
  --radius-sm:11px;
  --shadow:0 16px 44px rgba(0,0,0,.5);
  --glow:0 6px 18px rgba(139,92,246,.3);
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  min-height:100vh;background:var(--bg-0);color:var(--txt);
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
  overscroll-behavior-y:none;
}
button{font-family:inherit;cursor:pointer}
img{display:block}
input{font-family:inherit}
svg{display:block}
.ic{width:22px;height:22px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.ic.fill{fill:currentColor;stroke:none}

/* ambient */
.aura{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.aura span{position:absolute;border-radius:50%;filter:blur(70px);opacity:.42}
.aura .a1{width:380px;height:380px;background:radial-gradient(circle,rgba(139,92,246,.6),transparent 70%);top:-130px;left:-100px;animation:drift 20s ease-in-out infinite}
.aura .a2{width:420px;height:420px;background:radial-gradient(circle,rgba(34,197,94,.4),transparent 70%);top:8%;right:-160px;animation:drift 24s ease-in-out infinite -8s}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-26px) scale(1.12)}}

.wrap{position:relative;z-index:1;max-width:1280px;margin:0 auto}

/* header */
header{
  position:sticky;top:0;z-index:70;
  display:flex;align-items:center;gap:10px;
  padding:calc(10px + var(--safe-t)) clamp(14px,4vw,28px) 10px;
  background:rgba(10,10,13,.78);backdrop-filter:blur(16px) saturate(160%);
  border-bottom:1px solid transparent;transition:border-color .25s,box-shadow .25s;
}
header.stuck{border-bottom-color:var(--stroke);box-shadow:0 6px 22px rgba(0,0,0,.3)}
.brand{font-family:'Space Grotesk';font-weight:700;font-size:21px;letter-spacing:.6px;cursor:pointer;user-select:none;display:flex;align-items:center;gap:7px}
.brand b{color:var(--primary-bright)}
.brand .dot{width:7px;height:7px;border-radius:50%;background:var(--accent-bright);box-shadow:0 0 10px var(--accent-bright);align-self:flex-start;margin-top:3px}
.sp{flex:1}
.mini-select{appearance:none;background:var(--surface);color:var(--txt);border:1px solid var(--stroke);
  border-radius:10px;padding:8px 10px;font-size:12px;font-weight:700;cursor:pointer}
.iconbtn{position:relative;width:42px;height:42px;border-radius:12px;border:1px solid var(--stroke);
  background:var(--surface);color:var(--txt);display:grid;place-items:center;transition:.16s}
.iconbtn:active{transform:scale(.92)}
@media(hover:hover){.iconbtn:hover{background:var(--surface-2);border-color:var(--stroke-2)}}
.cnt{position:absolute;top:-5px;right:-5px;min-width:19px;height:19px;padding:0 5px;border-radius:10px;
  font-size:11px;font-weight:800;display:grid;place-items:center;border:2px solid var(--bg-0);
  background:linear-gradient(135deg,var(--pink),#f472b6);color:#fff;transform:scale(0);transition:transform .22s cubic-bezier(.2,1.5,.4,1)}
.cnt.show{transform:scale(1)}

/* banner hero */
.banner{position:relative;margin:14px clamp(14px,4vw,28px) 0;border-radius:20px;overflow:hidden;
  border:1px solid var(--stroke);aspect-ratio:16/8;
  background:
    radial-gradient(120% 160% at 12% 18%,rgba(139,92,246,.5),transparent 55%),
    radial-gradient(120% 160% at 92% 90%,rgba(34,197,94,.4),transparent 55%),
    linear-gradient(135deg,#15121f,#0c0c12);
  box-shadow:var(--shadow)}
@media(min-width:760px){.banner{aspect-ratio:24/7}}
.banner-fallback{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:0;pointer-events:none}
.banner-fallback .fw{font-family:'Space Grotesk';font-weight:700;font-size:clamp(26px,7vw,52px);letter-spacing:1px;color:#fff;opacity:.96}
.banner-fallback .fw b{color:var(--primary-bright)}
.banner-fallback .fs{font-size:clamp(11px,2.6vw,15px);font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.banner img{position:relative;z-index:1;width:100%;height:100%;object-fit:cover;display:block}

/* ticker */
.ticker{margin:12px clamp(14px,4vw,28px) 0;overflow:hidden;border:1px solid var(--stroke);border-radius:13px;
  background:var(--surface);padding:9px 0;mask-image:linear-gradient(90deg,transparent,#000 8%,#000 92%,transparent)}
.ticker-track{display:inline-flex;gap:34px;white-space:nowrap;animation:scroll-x 24s linear infinite;padding-left:34px}
.ticker-track span{font-size:13px;font-weight:600;color:var(--muted);display:inline-flex;align-items:center;gap:8px}
.ticker-track span::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--primary-bright)}
@keyframes scroll-x{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* controls */
.controls{position:sticky;top:var(--head-h,60px);z-index:60;padding:14px clamp(14px,4vw,28px) 6px;
  background:rgba(10,10,13,.9);backdrop-filter:blur(16px);scroll-margin-top:var(--head-h,60px)}
.filters{display:flex;gap:10px;overflow-x:auto;scroll-snap-type:x proximity;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;padding-bottom:4px;justify-content:flex-start}
.filters::-webkit-scrollbar{display:none}
@media(min-width:760px){.filters{justify-content:center;flex-wrap:wrap;overflow:visible}}
.fbtn{scroll-snap-align:start;flex-shrink:0;display:flex;align-items:center;gap:9px;padding:12px 18px;border-radius:15px;
  border:1px solid var(--stroke);background:var(--surface);color:var(--muted);font-size:15px;font-weight:600;
  transition:transform .14s,background .2s,border-color .2s,color .2s,box-shadow .2s;position:relative;overflow:hidden}
.fbtn .fi{width:28px;height:28px;border-radius:9px;display:grid;place-items:center;background:rgba(255,255,255,.05);transition:.2s}
.fbtn .fi .ic{width:17px;height:17px}
.fbtn:active{transform:scale(.95)}
@media(hover:hover){.fbtn:hover{border-color:var(--stroke-2);color:var(--txt);background:var(--surface-2)}}
.fbtn.on{color:#fff;border-color:transparent;background:linear-gradient(135deg,var(--primary),var(--primary-deep));box-shadow:var(--glow)}
.fbtn.on .fi{background:rgba(255,255,255,.18)}
.brandchips{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;height:0;opacity:0;transition:opacity .22s;overflow-y:hidden;justify-content:flex-start}
.brandchips::-webkit-scrollbar{display:none}
@media(min-width:760px){.brandchips.show{justify-content:center;flex-wrap:wrap;overflow:visible}}
.brandchips.show{height:auto;opacity:1;margin-top:10px;padding-bottom:4px}
.bchip{white-space:nowrap;flex-shrink:0;padding:9px 16px;border-radius:999px;border:1px solid var(--stroke);background:transparent;color:var(--muted);font-size:13.5px;font-weight:600;transition:.16s}
.bchip:active{transform:scale(.95)}
@media(hover:hover){.bchip:hover{color:var(--txt);border-color:var(--stroke-2)}}
.bchip.on{background:rgba(139,92,246,.2);border-color:var(--primary);color:#fff}
.sortpill{flex-shrink:0;display:flex;align-items:center;gap:7px;padding:9px 14px;border-radius:12px;border:1px solid var(--stroke);
  background:var(--surface);color:var(--txt);font-size:13.5px;font-weight:600;white-space:nowrap}
.sortpill:active{transform:scale(.95)}
@media(hover:hover){.sortpill:hover{background:var(--surface-2);border-color:var(--stroke-2)}}
.sortpill .ic{width:16px;height:16px}

.resultbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px clamp(14px,4vw,28px) 0}
.resultbar .rb-left{display:flex;align-items:baseline;gap:10px;min-width:0}
.resultbar .ctx{font-family:'Space Grotesk';font-size:19px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.resultbar .cnt2{font-size:13px;color:var(--muted);white-space:nowrap}
.resultbar .cnt2 b{color:var(--txt)}

/* grid */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;padding:12px clamp(14px,4vw,28px) calc(96px + var(--safe-b))}
@media(min-width:560px){.grid{grid-template-columns:repeat(3,1fr);gap:14px}}
@media(min-width:880px){.grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:1120px){.grid{grid-template-columns:repeat(5,1fr)}}

/* card */
.card{position:relative;display:flex;flex-direction:column;border-radius:var(--radius);overflow:hidden;
  background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.02));
  border:1px solid var(--stroke);
  opacity:0;transform:translateY(14px);transition:opacity .5s,transform .5s,border-color .2s,box-shadow .2s}
.card.in{opacity:1;transform:none}
.card.oos{opacity:.6}
.card.oos.in{opacity:.6}
@media(hover:hover){.card:hover{border-color:rgba(139,92,246,.4);box-shadow:0 18px 40px rgba(0,0,0,.45),0 0 26px rgba(139,92,246,.1);transform:translateY(-4px)}}
.thumb{position:relative;aspect-ratio:1/1;background:radial-gradient(circle at 50% 35%,rgba(139,92,246,.06),transparent 70%),var(--bg-2)}
.thumb img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
@media(hover:hover){.card:hover .thumb img{transform:scale(1.05)}}
.badges{position:absolute;top:9px;left:9px;display:flex;flex-direction:column;gap:5px;z-index:2}
.bdg{padding:4px 8px;border-radius:8px;font-size:11px;font-weight:800;letter-spacing:.02em;display:inline-flex;align-items:center;gap:4px}
.bdg.sale{background:linear-gradient(135deg,var(--pink),#f472b6);color:#fff}
.bdg.hit{background:rgba(34,197,94,.95);color:#06270f}
.heart{position:absolute;top:8px;right:8px;z-index:3;width:34px;height:34px;border-radius:10px;border:none;
  background:rgba(10,10,13,.5);backdrop-filter:blur(6px);color:#fff;display:grid;place-items:center;transition:.15s}
.heart:active{transform:scale(.82)}
.heart.on{color:var(--pink)}
.heart .ic{width:18px;height:18px}
.oosveil{position:absolute;inset:0;display:grid;place-items:center;background:rgba(8,8,12,.42);z-index:2}
.oosveil span{padding:6px 13px;border-radius:9px;background:rgba(18,18,24,.92);border:1px solid var(--stroke);font-size:12px;font-weight:600;color:var(--muted)}
.cbody{padding:11px 12px 12px;display:flex;flex-direction:column;flex:1}
.cbrand{font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--primary-bright)}
.cbody h4{margin:5px 0 0;font-size:13.5px;font-weight:600;line-height:1.28;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:35px}
.prow{display:flex;align-items:baseline;gap:7px;margin:9px 0 11px}
.pnew{font-family:'Space Grotesk';font-size:18px;font-weight:700;color:var(--accent-bright)}
.pold{font-size:12.5px;color:var(--muted-2);text-decoration:line-through;text-decoration-color:var(--danger)}
.addarea{margin-top:auto}
.add{width:100%;height:40px;border:none;border-radius:12px;font-weight:700;font-size:14px;color:#fff;
  background:linear-gradient(135deg,var(--primary),var(--primary-deep));display:flex;align-items:center;justify-content:center;gap:6px;transition:.14s}
.add:active{transform:scale(.96)}
.add.off{background:var(--surface);color:var(--muted-2);border:1px solid var(--stroke)}
.add .ic{width:18px;height:18px}
.cstep{display:flex;align-items:center;justify-content:space-between;height:40px;border-radius:12px;
  background:linear-gradient(135deg,var(--primary),var(--primary-deep))}
.cstep button{width:40px;height:40px;border:none;background:transparent;color:#fff;display:grid;place-items:center}
.cstep button:active{transform:scale(.85)}
.cstep b{font-family:'Space Grotesk';font-size:16px;font-weight:700;color:#fff}

.empty{grid-column:1/-1;text-align:center;padding:56px 20px;color:var(--muted)}
.empty .ei{color:var(--muted-2);margin:0 auto 12px;width:42px;height:42px}
.empty h5{color:var(--txt);font-size:16px;font-weight:600}
.empty p{margin-top:4px;font-size:14px}

/* floating cart */
.fab{position:fixed;left:0;right:0;bottom:0;z-index:90;padding:0 12px calc(12px + var(--safe-b));
  transform:translateY(150%);transition:transform .32s cubic-bezier(.3,.9,.3,1);pointer-events:none}
.fab.show{transform:translateY(0)}
.fab-inner{max-width:440px;margin:0 auto;pointer-events:auto;height:54px;border-radius:16px;
  background:rgba(19,19,26,.94);backdrop-filter:blur(16px);border:1px solid var(--stroke-2);
  box-shadow:0 16px 40px rgba(0,0,0,.6);
  display:flex;align-items:center;gap:11px;padding:0 8px;color:#fff}
.fab-inner:active{transform:scale(.985)}
.fab-ic{position:relative;width:38px;height:38px;border-radius:11px;display:grid;place-items:center;flex-shrink:0;
  background:linear-gradient(135deg,var(--primary),var(--primary-deep))}
.fab-ic .ic{width:20px;height:20px}
.fab-qty{position:absolute;top:-6px;right:-6px;min-width:18px;height:18px;padding:0 4px;border-radius:9px;
  background:#fff;color:var(--primary-deep);font-size:11px;font-weight:800;display:grid;place-items:center;border:2px solid rgba(19,19,26,1)}
.fab-lbl{font-weight:600;font-size:14.5px;color:var(--txt)}
.fab-total{margin-left:auto;font-family:'Space Grotesk';font-weight:700;font-size:15px;color:#06270f;
  background:linear-gradient(135deg,var(--accent),var(--accent-bright));padding:8px 14px;border-radius:11px}

/* bottom sheet */
.scrim{position:fixed;inset:0;z-index:100;background:rgba(5,5,8,.6);backdrop-filter:blur(3px);opacity:0;visibility:hidden;transition:.26s}
.scrim.show{opacity:1;visibility:visible}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:110;max-width:560px;margin:0 auto;
  background:var(--bg-1);border:1px solid var(--stroke);border-bottom:none;
  border-radius:22px 22px 0 0;box-shadow:var(--shadow);max-height:88vh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .34s cubic-bezier(.3,.9,.3,1)}
.sheet.show{transform:translateY(0)}
.grip{width:38px;height:4px;border-radius:3px;background:var(--stroke-2);margin:10px auto 0;flex-shrink:0}
.sheet-head{display:flex;align-items:center;gap:10px;padding:12px 18px 12px;border-bottom:1px solid var(--stroke)}
.sheet-head h3{font-family:'Space Grotesk';font-size:19px;font-weight:600}
.sheet-head .pill{font-size:12px;font-weight:700;padding:3px 9px;border-radius:8px;background:var(--surface-2);color:var(--muted)}
.sheet-x{margin-left:auto;width:34px;height:34px;border-radius:10px;border:none;background:var(--surface);color:var(--muted);display:grid;place-items:center}
.sheet-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 18px;display:flex;flex-direction:column;gap:11px}
.sheet-foot{padding:14px 18px calc(14px + var(--safe-b));border-top:1px solid var(--stroke);background:var(--bg-2)}

.citem{display:flex;gap:12px;padding:11px;border-radius:14px;background:var(--surface);border:1px solid var(--stroke)}
.citem img{width:60px;height:60px;border-radius:10px;object-fit:cover;background:var(--bg-2);flex-shrink:0}
.cinfo{flex:1;min-width:0}
.cinfo .cn{font-size:14px;font-weight:600;line-height:1.25}
.cinfo .ce{font-size:12px;color:var(--muted);margin-top:2px}
.cfoot{display:flex;align-items:center;gap:10px;margin-top:9px}
.step{display:flex;align-items:center;border:1px solid var(--stroke);border-radius:10px;overflow:hidden}
.step button{width:30px;height:30px;border:none;background:transparent;color:var(--txt);display:grid;place-items:center}
.step button:active{background:var(--surface-2)}
.step b{min-width:26px;text-align:center;font-size:14px;font-weight:700}
.cline{margin-left:auto;font-family:'Space Grotesk';font-weight:700;font-size:14px;color:var(--accent-bright)}
.cdel{border:none;background:none;color:var(--muted-2);display:grid;place-items:center;width:28px;height:28px}
.cdel:active{color:var(--danger)}
.cdel .ic{width:18px;height:18px}

.sheet-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);padding:50px 20px}
.sheet-empty .ic{width:46px;height:46px;color:var(--muted-2);margin-bottom:4px}
.sheet-empty h5{color:var(--txt);font-size:16px;font-weight:600}

.totals{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
.totals .tl{color:var(--muted);font-size:14px}
.totals .tv{font-family:'Space Grotesk';font-size:24px;font-weight:700}
.cta{width:100%;height:52px;border:none;border-radius:14px;font-weight:700;font-size:16px;color:#06270f;
  background:linear-gradient(135deg,var(--accent),var(--accent-bright));display:flex;align-items:center;justify-content:center;gap:8px}
.cta:active{transform:scale(.98)}
.cta:disabled{opacity:.4}

/* order */
.ometa{font-size:13px;color:var(--muted);margin-bottom:10px}
.ometa b{color:var(--primary-bright)}
.otext{width:100%;height:170px;resize:none;border-radius:14px;border:1px solid var(--stroke);
  background:var(--bg-0);color:var(--txt);padding:13px;font-size:13px;line-height:1.6}
.ghost{width:100%;height:48px;margin-top:10px;border:1px solid var(--stroke);border-radius:13px;background:var(--surface);color:var(--txt);font-weight:600}
.tg{width:100%;height:52px;border:none;border-radius:14px;background:var(--telegram);color:#fff;font-weight:700;font-size:16px;display:flex;align-items:center;justify-content:center;gap:8px}
.tg:active{transform:scale(.98)}

/* lightbox */
.lb{position:fixed;inset:0;z-index:140;display:none;align-items:center;justify-content:center;padding:22px;background:rgba(5,5,8,.92);backdrop-filter:blur(6px)}
.lb.show{display:flex}
.lb img{max-width:92vw;max-height:82vh;border-radius:16px;border:1px solid var(--stroke)}
.lb .lbx{position:absolute;top:calc(16px + var(--safe-t));right:16px;width:44px;height:44px;border-radius:12px;border:1px solid var(--stroke);background:var(--surface);color:#fff;display:grid;place-items:center}

/* age gate */
.age{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;padding:24px;background:var(--bg-0)}
.age.show{display:flex}
.age .card2{max-width:380px;text-align:center}
.age .agew{font-family:'Space Grotesk';font-weight:700;font-size:24px;letter-spacing:.6px;margin-bottom:18px}
.age .agew b{color:var(--primary-bright)}
.age h2{font-family:'Space Grotesk';font-size:25px;font-weight:700;margin-bottom:10px}
.age p{color:var(--muted);font-size:15px;line-height:1.55;margin-bottom:24px}
.age .ay{width:100%;height:54px;border:none;border-radius:14px;font-weight:700;font-size:16px;color:#fff;background:linear-gradient(135deg,var(--primary),var(--primary-deep));box-shadow:var(--glow)}
.age .an{width:100%;height:48px;margin-top:10px;border:1px solid var(--stroke);border-radius:14px;background:transparent;color:var(--muted);font-size:14px}
.age .deny{display:none;color:var(--danger);font-weight:600;margin-top:18px}

/* fly + toast */
.fly{position:fixed;z-index:160;pointer-events:none;border-radius:12px;object-fit:cover;box-shadow:var(--shadow);transition:transform .6s cubic-bezier(.3,.7,.3,1),opacity .6s}
.toast{position:fixed;left:50%;bottom:calc(86px + var(--safe-b));transform:translate(-50%,16px);z-index:170;
  padding:11px 18px;border-radius:13px;background:rgba(22,22,29,.97);border:1px solid var(--stroke);
  color:var(--txt);font-size:14px;font-weight:500;box-shadow:var(--shadow);opacity:0;visibility:hidden;transition:.24s}
.toast.show{opacity:1;visibility:visible;transform:translate(-50%,0)}

.pnew,.pold,.fab-total,.cline,.totals .tv,.cstep b,.step b,.cnt2 b,.fab-qty,.cnt{font-variant-numeric:tabular-nums}
:focus-visible{outline:2px solid var(--primary-bright);outline-offset:2px}
@media(prefers-reduced-motion:reduce){

    </button>

  <div class="banner">
    <div class="banner-fallback"><div class="fw">HORN<b>HUB</b></div><div class="fs">vape store</div></div>

  </div>

  <div class="ticker"><div class="ticker-track" id="ticker"></div></div>

  <div class="controls" id="controls">
    <div class="filters" id="chips"></div>

<!-- floating cart -->

  <div class="fab-inner">
    <div class="fab-ic">
      <svg class="ic" viewBox="0 0 24 24"><path d="M6 6h15l-1.5 9h-12L5 3H2"/><circle cx="9" cy="20" r="1.4" class="fill"/><circle cx="18" cy="20" r="1.4" class="fill"/></svg>
      <span class="fab-qty" id="fabQty">0</span>
    </div>
    <span class="fab-lbl" id="fabLbl">Корзина</span>
    <span class="fab-total" id="fabTotal">0</span>
  </div>
</div>

<!-- cart sheet -->

    <h3 data-i18n="cart">Корзина</h3>

  </div>
  <div class="sheet-body" id="cartItems"></div>

    <button class="cta" id="checkoutBtn" onclick="checkout()" data-i18n="checkout">Оформить заказ</button>
  </div>
</section>

<!-- order sheet -->
<div class="scrim" id="orderScrim" onclick="closeOrder()"></div>
<section class="sheet" id="orderSheet" aria-label="order">
  <div class="grip"></div>
  <div class="sheet-head">
    <h3 data-i18n="orderTitle">Ваш заказ</h3>
    <button class="sheet-x" onclick="closeOrder()"><svg class="ic" style="width:18px;height:18px" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
  </div>

    <div class="ometa" id="orderMeta"></div>

  </div>

    <button class="ay" onclick="confirmAge()" data-i18n="ageYes">Мне есть 18 лет</button>

    <div class="deny" id="ageDeny" data-i18n="ageDeny">Доступ только для совершеннолетних.</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* telegram */
const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
function haptic(type){ try{
  if(!tg) return;
  if(type==='sel') tg.HapticFeedback.selectionChanged();
  else if(type==='ok') tg.HapticFeedback.notificationOccurred('success');
  else if(type==='error') tg.HapticFeedback.notificationOccurred('error');
  else tg.HapticFeedback.impactOccurred(type||'light');
}catch(e){} }

/* config */
const ADMIN_NICK='gystds', ADMIN_URL='https://t.me/'+ADMIN_NICK;
const currencyRates={PLN:1,EUR:0.24,UAH:12.6};
const currencySymbols={PLN:'zł',EUR:'€',UAH:'₴'};
const discounts={elf:{old:50,new:35},vozol:{old:50,new:35},chaser:{old:60,new:35},cartridge:{old:35,new:30},elfking:{old:110,new:80},vozolreve:{old:110,new:80},bcpro:{old:110,new:80}};
const brandMeta={
  chaser:{label:'Chaser LUX',cat:'liquid'},elf:{label:'Elf Liq',cat:'liquid'},vozol:{label:'Vozol',cat:'liquid'},
  elfking:{label:'Elf King 40k',cat:'disposable'},bcpro:{label:'BC Pro 40k',cat:'disposable'},vozolreve:{label:'Vozol Reve 40k',cat:'disposable'},
  cartridge:{label:'Cartridge',cat:'cartridge'},
};
const slug=n=>n.replace(/[^a-zA-Z0-9]/g,'_');
const products=[
  ...['Grape Mint','Berry Lemonade','Blackberry Lemonade','Sour Apple','Vitamin','Coconut Melon','Energetic','Strawberry Cream','Watermelon Raspberry','Kiwi Passion Guava'].map((n,i)=>({id:100+i,name:`Chaser – ${n}`,flavor:n,brand:'chaser',category:'liquid',img:`images/chaser/${slug(n)}.png`})),
  ...['Blackcurrant Aniseed','Pineapple Colada','Strawberry Snoow','Blue Razz Lemonade','Green Grape Rose','Sour Watermelon Gummy','Strawberry Banana','Blueberry Raspberry Pomegranate','P&B Cloud'].map((n,i)=>({id:1+i,name:`Elf Liq – ${n}`,flavor:n,brand:'elf',category:'liquid',img:`images/elf/${slug(n)}.png`})),
  ...['Dragon Fruit Banana Cherry','Purple Candy','Pineapple Passion Fruit Lime','Strawberry Kiwi','Love 777','Grape Ice','Watermelon Bubblegum','Pomegranate Lemonade','Mint Ice'].map((n,i)=>({id:200+i,name:`Vozol – ${n}`,flavor:n,brand:'vozol',category:'liquid',img:`images/vazool/${slug(n)}.png`})),
  ...['Milki Oolong','Blue Razz Ice','Sour Apple Ice','Sour Pineapple Ice','Sour Strawberry Dragonfruit'].map((n,i)=>({id:400+i,name:`Elf King 40k – ${n}`,flavor:n,brand:'elfking',category:'disposable',img:`images/elfking/${slug(n)}.png`})),
  ...['Pineapple Rom','Grape Twist','Strawberry Raspberry Frost','Strawberry Kiwi','Aurora Berries'].map((n,i)=>({id:600+i,name:`BC Pro 40k – ${n}`,flavor:n,brand:'bcpro',category:'disposable',img:`images/bcpro/${slug(n)}.png`})),
  ...['Watermelon Bubblegum','Strawberry Mango','Kiwi Passion Fruit','Mango Ice','Grape Ice'].map((n,i)=>({id:500+i,name:`Vozol Reve 40k – ${n}`,flavor:n,brand:'vozolreve',category:'disposable',img:`images/vozolreve/${slug(n)}.png`})),
  {id:300,name:'Xros Cartridge 0.6Ω',flavor:'Xros 0.6Ω',brand:'cartridge',category:'cartridge',img:'images/cart/xros.png'},
];
const outOfStock=['Chaser – Grape Mint','Chaser – Berry Lemonade','Chaser – Blackberry Lemonade','Chaser – Sour Apple','Chaser – Vitamin','Chaser – Coconut Melon','Chaser – Energetic','Chaser – Strawberry Cream','Chaser – Watermelon Raspberry','Chaser – Kiwi Passion Guava','Vozol – Dragon Fruit Banana Cherry','Vozol – Purple Candy','Vozol – Pineapple Passion Fruit Lime','Vozol – Strawberry Kiwi','Vozol – Love 777','Vozol – Grape Ice','Vozol – Watermelon Bubblegum','Vozol – Pomegranate Lemonade','Vozol – Mint Ice','Elf Liq – Blackcurrant Aniseed'];
products.forEach(p=>{const d=discounts[p.brand];p.outOfStock=outOfStock.includes(p.name);p.price=d?d.old:0;p.newPrice=d?d.new:p.price;});

/* i18n */
const i18n={
  ru:{search:"Поиск по вкусам...",sortDefault:"Рекомендуемые",priceAsc:"Цена ↑",priceDesc:"Цена ↓",byName:"А–Я",sortShort:"Сорт",
    allProducts:"Все",disposable:"Одноразки",liquid:"Жидкости",cartridge:"Картриджи",
    add:"В корзину",outNow:"Нет",sale:"−",hit:"Хит",found:"Найдено",items:"шт",favTitle:"Избранное",allTitle:"Все товары",
    cart:"Корзина",total:"Итого",checkout:"Оформить заказ",emptyCart:"Корзина пуста",emptyCartSub:"Добавь что-нибудь вкусное",
    emptyProducts:"Ничего не нашли",emptyProductsSub:"Измени фильтр или запрос",
    added:"Добавлено ✅",removed:"Удалено",favAdd:"В избранном ❤️",favRem:"Убрано из избранного",
    orderTitle:"Ваш заказ",orderNumber:"Заказ",consultant:"Консультант",copySend:"Скопировать и открыть Telegram",close:"Закрыть",copied:"Скопировано ✅",copyErr:"Ошибка копирования",
    ageTitle:"Тебе есть 18?",ageText:"Продажа никотиносодержащей продукции — только для совершеннолетних. Подтверди возраст, чтобы продолжить.",ageYes:"Мне есть 18 лет",ageNo:"Мне нет 18",ageDeny:"Доступ только для совершеннолетних.",
    ticker:["−42% на Chaser LUX","Одноразки 40k в наличии","Заказ в Telegram за 30 секунд","Новые вкусы каждую неделю","Оплата при получении"]},
  ua:{search:"Пошук за смаками...",sortDefault:"Рекомендовані",priceAsc:"Ціна ↑",priceDesc:"Ціна ↓",byName:"А–Я",sortShort:"Сорт",
    allProducts:"Всі",disposable:"Одноразки",liquid:"Рідини",cartridge:"Картриджі",
    add:"До кошика",outNow:"Немає",sale:"−",hit:"Хіт",found:"Знайдено",items:"шт",favTitle:"Обране",allTitle:"Всі товари",
    cart:"Кошик",total:"Разом",checkout:"Оформити замовлення",emptyCart:"Кошик порожній",emptyCartSub:"Додай щось смачне",
    emptyProducts:"Нічого не знайшли",emptyProductsSub:"Зміни фільтр або запит",
    added:"Додано ✅",removed:"Видалено",favAdd:"В обраному ❤️",favRem:"Прибрано з обраного",
    orderTitle:"Ваше замовлення",orderNumber:"Замовлення",consultant:"Консультант",copySend:"Скопіювати і відкрити Telegram",close:"Закрити",copied:"Скопійовано ✅",copyErr:"Помилка копіювання",
    ageTitle:"Тобі є 18?",ageText:"Продаж нікотиновмісної продукції — лише для повнолітніх. Підтверди вік, щоб продовжити.",ageYes:"Мені є 18 років",ageNo:"Мені немає 18",ageDeny:"Доступ лише для повнолітніх.",
    ticker:["−42% на Chaser LUX","Одноразки 40k в наявності","Замовлення в Telegram за 30 секунд","Нові смаки щотижня","Оплата при отриманні"]},
  en:{search:"Search flavors...",sortDefault:"Recommended",priceAsc:"Price ↑",priceDesc:"Price ↓",byName:"A–Z",sortShort:"Sort",
    allProducts:"All",disposable:"Disposables",liquid:"Liquids",cartridge:"Cartridges",
    add:"Add",outNow:"Out",sale:"−",hit:"Hit",found:"Found",items:"items",favTitle:"Favorites",allTitle:"All products",
    cart:"Cart",total:"Total",checkout:"Checkout",emptyCart:"Your cart is empty",emptyCartSub:"Add something tasty",
    emptyProducts:"No results",emptyProductsSub:"Try a different filter or search",
    added:"Added ✅",removed:"Removed",favAdd:"Saved ❤️",favRem:"Removed from favorites",
    orderTitle:"Your order",orderNumber:"Order",consultant:"Consultant",copySend:"Copy & open Telegram",close:"Close",copied:"Copied ✅",copyErr:"Couldn't copy",
    ageTitle:"Are you 18?",ageText:"Nicotine products are sold to adults only. Confirm your age to continue.",ageYes:"I'm 18 or older",ageNo:"I'm under 18",ageDeny:"Adults only.",
    ticker:["−42% on Chaser LUX","40k disposables in stock","Order via Telegram in 30s","New flavors every week","Pay on delivery"]},
};

/* state */
let lang=localStorage.getItem('lang')||'ru';
let currency=localStorage.getItem('currency')||'PLN';
let cart=JSON.parse(localStorage.getItem('cart')||'[]');
let favorites=JSON.parse(localStorage.getItem('favorites')||'[]');
let currentCategory='all', currentBrand=null, currentSort='default', searchQuery='', showingFavorites=false, lastOrderText='';
const sortCycle=['default','priceAsc','priceDesc','name'];

const $=id=>document.getElementById(id);
const T=k=>(i18n[lang][k]??k);
const fmt=pln=>Math.round(pln*currencyRates[currency])+' '+currencySymbols[currency];
const getQty=id=>{const it=cart.find(p=>p.id===id);return it?it.qty:0;};

const ICON_HEART='<svg class="ic" viewBox="0 0 24 24"><path d="M12 21s-7-4.6-9.5-9A5.5 5.5 0 0 1 12 6a5.5 5.5 0 0 1 9.5 6c-2.5 4.4-9.5 9-9.5 9Z"/></svg>';
const ICON_HEART_F='<svg class="ic fill" viewBox="0 0 24 24"><path d="M12 21s-7-4.6-9.5-9A5.5 5.5 0 0 1 12 6a5.5 5.5 0 0 1 9.5 6c-2.5 4.4-9.5 9-9.5 9Z"/></svg>';
const ICON_PLUS='<svg class="ic" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>';
const ICON_MINUS='<svg class="ic" viewBox="0 0 24 24"><path d="M5 12h14"/></svg>';
const ICON_BAG='<svg class="ic" viewBox="0 0 24 24"><path d="M6 6h15l-1.5 9h-12L5 3H2"/></svg>';
const ICON_TRASH='<svg class="ic" viewBox="0 0 24 24"><path d="M4 7h16M9 7V5h6v2m-8 0 1 13h8l1-13"/></svg>';
const CAT_ICONS={
  all:'<svg class="ic" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.6"/><rect x="14" y="3" width="7" height="7" rx="1.6"/><rect x="3" y="14" width="7" height="7" rx="1.6"/><rect x="14" y="14" width="7" height="7" rx="1.6"/></svg>',
  disposable:'<svg class="ic" viewBox="0 0 24 24"><rect x="7" y="2.5" width="10" height="19" rx="3.4"/><path d="M10 6h4M12 9v3.5"/><path d="M11 12.5h2l-.5 3h-1l-.5-3Z" class="fill" stroke="none"/></svg>',
  liquid:'<svg class="ic" viewBox="0 0 24 24"><path d="M12 3s6 6.4 6 10.4A6 6 0 0 1 6 13.4C6 9.4 12 3 12 3Z"/></svg>',
  cartridge:'<svg class="ic" viewBox="0 0 24 24"><rect x="6" y="3" width="12" height="18" rx="2.4"/><path d="M9 3v3h6V3M10 11h4"/></svg>',
};

/* i18n apply */
function applyI18n(){
  document.documentElement.lang=lang;
  $('sortLabel').textContent=T(currentSort==='default'?'sortShort':currentSort);
  document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=T(el.dataset.i18n));
  renderChips();
  renderTicker();
}
function renderTicker(){
  const items=i18n[lang].ticker.concat(i18n[lang].ticker);
  $('ticker').innerHTML=items.map(t=>`<span>${t}</span>`).join('');
}
function renderChips(){
  const cats=[['all','allProducts'],['disposable','disposable'],['liquid','liquid'],['cartridge','cartridge']];
  $('chips').innerHTML=cats.map(([c,k])=>`<button class="fbtn ${currentCategory===c&&!showingFavorites?'on':''}" onclick="setCategory('${c}')"><span class="fi">${CAT_ICONS[c]}</span>${T(k)}</button>`).join('');
  renderBrandChips();
}
function renderBrandChips(){
  const box=$('brandchips');
  if(currentCategory==='all'||currentCategory==='cartridge'){box.classList.remove('show');box.innerHTML='';return;}
  const list=Object.entries(brandMeta).filter(([k,m])=>m.cat===currentCategory);
  box.innerHTML=list.map(([k,m])=>`<button class="bchip ${currentBrand===k?'on':''}" onclick="setBrand('${k}')">${m.label}</button>`).join('');
  box.classList.add('show');
}

/* list */
function computeList(){
  let list=products.slice();
  if(showingFavorites) list=list.filter(p=>favorites.includes(p.id));
  if(currentCategory!=='all') list=list.filter(p=>p.category===currentCategory);
  if(currentBrand) list=list.filter(p=>p.brand===currentBrand);
  if(searchQuery){const q=searchQuery.toLowerCase();list=list.filter(p=>p.name.toLowerCase().includes(q)||(brandMeta[p.brand]?.label||'').toLowerCase().includes(q));}
  if(currentSort==='priceAsc') list.sort((a,b)=>a.newPrice-b.newPrice);
  else if(currentSort==='priceDesc') list.sort((a,b)=>b.newPrice-a.newPrice);
  else if(currentSort==='name') list.sort((a,b)=>a.name.localeCompare(b.name));
  list.sort((a,b)=>(a.outOfStock?1:0)-(b.outOfStock?1:0));
  return list;
}

function addControlHTML(p){
  if(p.outOfStock) return `<button class="add off" disabled>${T('outNow')}</button>`;
  const q=getQty(p.id);
  if(q<=0) return `<button class="add" onclick="event.stopPropagation();addToCart(${p.id},this)">${ICON_PLUS}${T('add')}</button>`;
  return `<div class="cstep"><button onclick="event.stopPropagation();decQty(${p.id})">${ICON_MINUS}</button><b>${q}</b><button onclick="event.stopPropagation();incQty(${p.id})">${ICON_PLUS}</button></div>`;
}

let io=null;
function renderProducts(){
  const list=computeList();
  $('ctx').textContent=showingFavorites?T('favTitle'):(currentBrand?brandMeta[currentBrand].label:T(currentCategory==='all'?'allTitle':currentCategory));
  $('cnt2').innerHTML=`${T('found')} <b>${list.length}</b> ${T('items')}`;
  const box=$('grid');
  if(!list.length){
    box.innerHTML=`<div class="empty"><svg class="ic ei" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><h5>${T('emptyProducts')}</h5><p>${T('emptyProductsSub')}</p></div>`;
    return;
  }
  box.innerHTML=list.map((p,idx)=>{
    const fav=favorites.includes(p.id);
    const d=discounts[p.brand];
    const pct=d?Math.round((1-d.new/d.old)*100):0;
    return `<article class="card ${p.outOfStock?'oos':''}" style="transition-delay:${Math.min(idx,8)*35}ms">
      <div class="thumb" onclick="openLb('${p.img}')">
        <div class="badges">
          ${d&&!p.outOfStock?`<span class="bdg sale">−${pct}%</span>`:''}
          ${!p.outOfStock&&p.category==='disposable'?`<span class="bdg hit">${T('hit')}</span>`:''}
        </div>
        ${p.outOfStock?`<div class="oosveil"><span>${T('outNow')}</span></div>`:''}
        <img src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.style.opacity=.15">
        <button class="heart ${fav?'on':''}" id="heart-${p.id}" onclick="event.stopPropagation();toggleFav(${p.id})">${fav?ICON_HEART_F:ICON_HEART}</button>
      </div>
      <div class="cbody">
        <div class="cbrand">${brandMeta[p.brand]?.label||p.brand}</div>
        <h4>${p.flavor||p.name}</h4>
        <div class="prow"><span class="pnew">${fmt(p.newPrice)}</span>${d?`<span class="pold">${fmt(p.price)}</span>`:''}</div>
        <div class="addarea" id="add-${p.id}">${addControlHTML(p)}</div>
      </div>
    </article>`;
  }).join('');
  setupReveal();
}
function setupReveal(){
  const cards=document.querySelectorAll('.card');
  if(!('IntersectionObserver' in window)){cards.forEach(c=>c.classList.add('in'));return;}
  if(io) io.disconnect();
  io=new IntersectionObserver((entries)=>{
    entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});
  },{rootMargin:'0px 0px -40px 0px'});
  cards.forEach(c=>io.observe(c));
}
function refreshCard(id){
  const p=products.find(x=>x.id===id);
  const a=$('add-'+id); if(a) a.innerHTML=addControlHTML(p);
  const h=$('heart-'+id); if(h){const f=favorites.includes(id);h.className='heart '+(f?'on':'');h.innerHTML=f?ICON_HEART_F:ICON_HEART;}
}

/* filters */
function setCategory(c){showingFavorites=false;currentCategory=c;currentBrand=null;renderChips();renderProducts();haptic('sel');}
function setBrand(b){currentBrand=currentBrand===b?null:b;renderBrandChips();renderProducts();haptic('sel');}
function cycleSort(){currentSort=sortCycle[(sortCycle.indexOf(currentSort)+1)%sortCycle.length];$('sortLabel').textContent=T(currentSort==='default'?'sortShort':currentSort);renderProducts();haptic('sel');}

/* favorites */
function toggleFav(id){
  const i=favorites.indexOf(id);
  if(i>-1){favorites.splice(i,1);showToast('favRem');}else{favorites.push(id);showToast('favAdd');haptic('light');}
  localStorage.setItem('favorites',JSON.stringify(favorites));
  updateBadges();
  if(showingFavorites) renderProducts(); else refreshCard(id);
}
function toggleFavView(){
  showingFavorites=!showingFavorites;
  if(showingFavorites){currentCategory='all';currentBrand=null;searchQuery='';}
  renderChips();
  renderProducts();scrollToShop();haptic('sel');
}

/* cart */
function addToCart(id,btn){
  const base=products.find(p=>p.id===id);
  if(!base||base.outOfStock) return;
  const ex=cart.find(p=>p.id===id);
  if(ex) ex.qty++; else cart.push({id:base.id,name:base.name,img:base.img,price:base.newPrice,qty:1});
  persist();updateBadges();refreshCard(id);if($('cartSheet').classList.contains('show'))renderCart();
  showToast('added');haptic('light');
  const img=btn?.closest('.card')?.querySelector('.thumb img'); if(img) flyToCart(img);
}
function incQty(id){const it=cart.find(p=>p.id===id);if(it)it.qty++;else addToCart(id);commitCart(id);haptic('light');}
function decQty(id){const idx=cart.findIndex(p=>p.id===id);if(idx<0)return;cart[idx].qty--;if(cart[idx].qty<=0)cart.splice(idx,1);commitCart(id);haptic('light');}
function commitCart(id){persist();updateBadges();refreshCard(id);if($('cartSheet').classList.contains('show'))renderCart();}
function removeItem(i){const id=cart[i].id;cart.splice(i,1);persist();updateBadges();renderCart();refreshCard(id);showToast('removed');haptic('light');}
function persist(){localStorage.setItem('cart',JSON.stringify(cart));}

function renderCart(){
  const box=$('cartItems');
  const qty=cart.reduce((s,p)=>s+p.qty,0);
  $('cartPill').textContent=qty;
  $('checkoutBtn').disabled=!cart.length;
  if(!cart.length){
    box.innerHTML=`<div class="sheet-empty">${ICON_BAG}<h5>${T('emptyCart')}</h5><p>${T('emptyCartSub')}</p></div>`;
    $('cartTotal').textContent=fmt(0);return;
  }
  let total=0;
  box.innerHTML=cart.map((p,i)=>{total+=p.price*p.qty;return `<div class="citem">
    <img src="${p.img}" onerror="this.style.opacity=.2">
    <div class="cinfo"><div class="cn">${p.name}</div><div class="ce">${fmt(p.price)}</div>
      <div class="cfoot">
        <div class="step"><button onclick="changeCartQty(${i},-1)">${ICON_MINUS}</button><b>${p.qty}</b><button onclick="changeCartQty(${i},1)">${ICON_PLUS}</button></div>
        <span class="cline">${fmt(p.price*p.qty)}</span>
        <button class="cdel" onclick="removeItem(${i})">${ICON_TRASH}</button>
      </div></div></div>`;}).join('');
  $('cartTotal').textContent=fmt(total);
}
function changeCartQty(i,d){const id=cart[i].id;cart[i].qty+=d;if(cart[i].qty<=0)cart.splice(i,1);persist();updateBadges();renderCart();refreshCard(id);haptic('light');}

function updateBadges(){
  const q=cart.reduce((s,p)=>s+p.qty,0);
  const fc=$('favCnt');fc.textContent=favorites.length;fc.classList.toggle('show',favorites.length>0);
  $('fabQty').textContent=q;
  $('fabLbl').textContent=T('cart');
  $('fabTotal').textContent=fmt(cart.reduce((s,p)=>s+p.price*p.qty,0));
  $('fab').classList.toggle('show',q>0&&!anySheetOpen());
}

/* sheets */
function anySheetOpen(){return $('cartSheet').classList.contains('show')||$('orderSheet').classList.contains('show');}
function openCart(){renderCart();$('cartScrim').classList.add('show');$('cartSheet').classList.add('show');$('fab').classList.remove('show');syncBack();haptic('light');}
function closeCart(){$('cartScrim').classList.remove('show');$('cartSheet').classList.remove('show');updateBadges();syncBack();}
function checkout(){
  if(!cart.length)return;
  const id=Date.now().toString().slice(-6);
  const total=cart.reduce((s,p)=>s+p.price*p.qty,0);
  const lines=cart.map(p=>`• ${p.name} × ${p.qty} — ${fmt(p.price*p.qty)}`).join('\n');
  lastOrderText=`${T('orderNumber')}: #${id}\n${T('consultant')}: @${ADMIN_NICK}\n\n${lines}\n\n${T('total')}: ${fmt(total)}`;
  $('orderText').value=lastOrderText;
  $('orderMeta').innerHTML=`${T('orderNumber')}: <b>#${id}</b>`;
  closeCart();
  $('orderScrim').classList.add('show');$('orderSheet').classList.add('show');syncBack();haptic('ok');
}
function closeOrder(){$('orderScrim').classList.remove('show');$('orderSheet').classList.remove('show');updateBadges();syncBack();}
async function copyAndOpenTelegram(){
  try{await navigator.clipboard.writeText(lastOrderText);showToast('copied');}catch{showToast('copyErr');}
  if(tg&&tg.openTelegramLink) tg.openTelegramLink(ADMIN_URL); else window.open(ADMIN_URL,'_blank');
}

/* lightbox */
function openLb(src){$('lbImg').src=src;$('lb').classList.add('show');syncBack();}
function closeLb(){$('lb').classList.remove('show');syncBack();}

/* back button */
function syncBack(){
  const open=anySheetOpen()||$('lb').classList.contains('show');
  if(!tg||!tg.BackButton)return;
  try{ open?tg.BackButton.show():tg.BackButton.hide(); }catch(e){}
}
function closeTop(){
  if($('lb').classList.contains('show'))return closeLb();
  if($('orderSheet').classList.contains('show'))return closeOrder();
  if($('cartSheet').classList.contains('show'))return closeCart();
}

/* fly */
function flyToCart(img){
  const target=$('fab').classList.contains('show')?$('fab'):$('favCnt');
  const a=img.getBoundingClientRect();
  let bx=window.innerWidth/2, by=window.innerHeight-40;
  if(target){const b=target.getBoundingClientRect();bx=b.left+b.width/2;by=b.top+b.height/2;}
  const clone=document.createElement('img');
  clone.src=img.src;clone.className='fly';
  clone.style.left=a.left+'px';clone.style.top=a.top+'px';clone.style.width=a.width+'px';clone.style.height=a.height+'px';
  document.body.appendChild(clone);
  requestAnimationFrame(()=>{clone.style.transform=`translate(${bx-a.left-a.width/2}px,${by-a.top-a.height/2}px) scale(.1)`;clone.style.opacity='0';});
  setTimeout(()=>clone.remove(),640);
}

/* toast */
let toastTimer;
function showToast(key){const t=$('toast');t.textContent=T(key);t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),1700);}

/* lang/currency */
function setLang(l){lang=l;localStorage.setItem('lang',l);$('langSelect').value=l;applyI18n();renderProducts();if($('cartSheet').classList.contains('show'))renderCart();updateBadges();}
function setCurrency(c){currency=c;localStorage.setItem('currency',c);$('curSelect').value=c;renderProducts();if($('cartSheet').classList.contains('show'))renderCart();updateBadges();}

/* nav */
function goHome(){showingFavorites=false;currentCategory='all';currentBrand=null;searchQuery='';renderChips();renderProducts();window.scrollTo({top:0,behavior:'smooth'});}
function scrollToShop(){$('controls').scrollIntoView({behavior:'smooth',block:'start'});}

/* age */
function confirmAge(){localStorage.setItem('age_ok','1');$('age').classList.remove('show');haptic('ok');}
function denyAge(){$('ageDeny').style.display='block';haptic('error');setTimeout(()=>{if(tg&&tg.close)tg.close();else location.href='https://www.google.com';},1500);}

/* global */
function setHeadH(){const h=$('header').offsetHeight;document.documentElement.style.setProperty('--head-h',h+'px');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeTop();});
window.addEventListener('scroll',()=>{$('header').classList.toggle('stuck',window.scrollY>8);},{passive:true});
window.addEventListener('resize',setHeadH);

window.addEventListener('load',()=>{
  if(tg){try{tg.ready();tg.expand();tg.setHeaderColor('#0a0a0d');tg.setBackgroundColor('#0a0a0d');tg.BackButton.onClick(closeTop);}catch(e){}}
  $('langSelect').value=lang;$('curSelect').value=currency;
  setHeadH();
  applyI18n();renderProducts();updateBadges();renderCart();
  if(localStorage.getItem('age_ok')!=='1')$('age').classList.add('show');
});
</script>
</body>
</html>
